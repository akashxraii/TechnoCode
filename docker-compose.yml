

services:
  postgres:
    image: postgres:15
    container_name: technocode_db
    restart: always
    environment:
      POSTGRES_USER: technocode
      POSTGRES_PASSWORD: technocode123
      POSTGRES_DB: technocode
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: technocode_redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  pgdata: